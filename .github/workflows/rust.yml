name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Install stable toolchain
      uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
      with:
        toolchain: stable
        components: clippy, rustfmt

    - name: Cache Cargo dependencies
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: cargo-${{ runner.os }}-stable-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-stable-

    - name: Install Protoc
      uses: arduino/setup-protoc@f4d5893b897028ff5739576ea0409746887fa536 # v3.0.0

    - name: Check formatting
      run: cargo +stable fmt --all -- --check

    - name: Build
      run: cargo +stable build --locked --all-targets --all-features --verbose

    - name: Run Clippy
      run: cargo +stable clippy --locked --all-targets --all-features -- -D warnings

    - name: Run tests
      run: cargo +stable test --locked --all-targets --all-features --verbose

    - name: Security audit
      run: |
        cargo install cargo-audit --locked --version 0.22.2
        cargo audit

  container-smoke:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Start mock upstream
      run: |
        mkdir -p /tmp/mock-upstream
        echo 'pingsix-smoke-ok' > /tmp/mock-upstream/index.html
        python3 -m http.server 18080 --directory /tmp/mock-upstream &
        for _ in {1..20}; do
          if curl --fail --silent http://127.0.0.1:18080/ | grep -q pingsix-smoke-ok; then
            exit 0
          fi
          sleep 0.5
        done
        exit 1

    - name: Build image
      run: docker build --tag pingsix:ci .

    - name: Start image
      run: |
        docker run --detach --name pingsix-ci \
          --add-host=host.docker.internal:host-gateway \
          -p 8080:8080 \
          -v "$PWD/ci/config.smoke.yaml:/app/config.yaml:ro" \
          pingsix:ci

    - name: Wait for readiness
      run: |
        for _ in {1..12}; do
          if docker exec pingsix-ci curl --fail --silent http://127.0.0.1:7085/status/ready >/dev/null; then
            exit 0
          fi
          sleep 5
        done
        docker logs pingsix-ci
        exit 1

    - name: Proxy smoke request
      run: |
        body=$(curl --silent --show-error --fail http://127.0.0.1:8080/)
        echo "proxy body: $body"
        echo "$body" | grep -q pingsix-smoke-ok

    - name: Stop image
      if: always()
      run: docker rm --force pingsix-ci || true

pingora:
  version: 1
  threads: 2
  pid_file: /run/pingora.pid
  upgrade_sock: /tmp/pingora_upgrade.sock
  user: nobody
  group: webusers

pingsix:
  defaults:
    # DNS preparation has a bounded deadline; dynamic DNS-only updates activate
    # only after a successful resolution.
    dns_resolution_timeout: 5

  # listener on TCP or TLS
  listeners:
    - address: 0.0.0.0:8080
    # - address: "[::1]:443"
    #   tls:
    #     cert_path: /etc/ssl/server.crt
    #     key_path: /etc/ssl/server.key
    #   offer_h2: true
  
  # etcd:
  #   host:
  #     - "http://192.168.2.141:2379"
  #   prefix: /apisix

  # admin:
  #   address: "0.0.0.0:9181"
  #   api_key: pingsix

  # Status/health check endpoint (independent of admin API)
  # Useful for Kubernetes readiness probes and load balancer health checks
  status:
    address: "127.0.0.1:7085"
    # Production etcd deployments fail readiness after five minutes disconnected.
    config_stale_after: 300
    fail_readiness_when_stale: true

  # Bind Prometheus metrics to loopback only; scrape via a sidecar/forwarder.
  prometheus:
    address: 127.0.0.1:9091

  # sentry: configure with your own project DSN. The example/placeholder DSN
  # (https://examplePublicKey@o0.ingest.sentry.io/0) is detected and ignored at startup.

# api routes example for https://apisix.apache.org/docs/apisix/admin-api/#route
# Here is a complete example, which is a subset of routes from the apisix docs. The fields not mentioned here indicate that pingsix does not support them.
# The fields in the following comments are all optional parameters.
# Upstream nodes use local placeholders (127.0.0.1:1980); replace with real backends in production.
routes:
  - id: 1
    uri: /
    # uris: ["/","/test"]
    host: localhost
    # hosts: ["localhost","api.localhost"]
    # methods: ["GET", "POST"]
    # timeout:
    #   connect: 2
    #   send: 3
    #   read: 5
    # priority: 10
    upstream: # Field description https://apisix.apache.org/docs/apisix/admin-api/#upstream
      # id: 1
      # retries: 2
      # retry_timeout: 10
      nodes:
        "127.0.0.1:1980": 1
      type: roundrobin # supported types: roundrobin, random, fnv, ketama
      # timeout:
      #   connect: 2
      #   send: 3
      #   read: 5
      checks: # Field description https://apisix.apache.org/docs/apisix/tutorials/health-check/
        active: # only support active check
          type: http
          timeout: 1
          host: localhost
          http_path: /
          # port: 8443
          https_verify_certificate: true
          req_headers: ["User-Agent: curl/7.29.0"]
          healthy:
            interval: 5
            http_statuses: [200, 201]
            successes: 2
          unhealthy:
            http_failures: 5
            tcp_failures: 2
      hash_on: vars # supported types: vars, cookie, head
      key: uri
      pass_host: rewrite
      upstream_host: localhost
      scheme: http
  - id: 2
    uri: /
    host: localhost
    upstream_id: 1
  - id: 3
    uri: /
    service_id: 1
  - id: 4
    uri: /
    host: localhost
    service_id: 2
  - id: 5
    uri: /echo
    host: localhost
    service_id: 2
    plugins:
      echo:
        body: "Hello world!"
        headers:
          X-TEST: demo

upstreams:
  - id: 1
    nodes:
      "127.0.0.1:1980": 1
    type: roundrobin
    pass_host: rewrite
    upstream_host: localhost
    scheme: http
  - id: 2
    nodes:
      "127.0.0.1:1980": 1
    type: roundrobin
    scheme: http

services:
  - id: 1
    hosts: ["localhost"]
    upstream_id: 2
  - id: 2
    upstream:
      nodes:
        "127.0.0.1:1980": 1
      type: roundrobin
      scheme: http
    plugins:
      limit-count:
        key_type: head
        key: Host
        time_window: 1
        count: 1
        rejected_code: 429
        rejected_msg: "Pleas slow down!"

global_rules:
  - id: 1
    plugins:
      prometheus: {}
